<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#05070a" />
    <title>Connection Required</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05070a;
        color: #ffffff;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 20px;
        color: #cbd5e1;
        font-size: 15px;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: #f5b51b;
        color: #101318;
        font-weight: 700;
        padding: 0 18px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Connection Required</h1>
      <p>BEE Suite needs an internet connection to load secure family records, messages, documents, and billing details.</p>
      <a href="https://thebeesuite.io/parents">Try again</a>
    </main>
  </body>
</html>
