<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc"><title id="title">The BEE Suite getting started platform map</title><desc id="desc">Step-by-step launch map for Vercel, Supabase, Stripe, Twilio, SendGrid, Google, OpenAI, Procare imports, and school users.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#090d12"/><stop offset=".62" stop-color="#05070a"/><stop offset="1" stop-color="#1c1406"/></linearGradient><linearGradient id="gold" x1="0" x2="1"><stop stop-color="#fde68a"/><stop offset="1" stop-color="#f5b51b"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".35"/></filter><style>.k{font-family:Inter,Arial,sans-serif}.h{font-weight:900;fill:#fff}.m{fill:#d4d4d8}.s{fill:#a1a1aa}.card{fill:rgba(255,255,255,.075);stroke:rgba(255,255,255,.16);stroke-width:1.5}.pill{fill:rgba(245,181,27,.12);stroke:rgba(245,181,27,.42)}.num{fill:#15100a;font-weight:900}.small{font-size:24px}.body{font-size:28px}.label{font-size:20px;font-weight:800;letter-spacing:.12em}.title{font-size:66px;font-weight:950}.step{font-size:33px;font-weight:900}.note{font-size:22px}</style></defs><rect width="1600" height="1000" fill="url(#bg)"/><g opacity=".12"><path d="M0 96h1600M0 196h1600M0 296h1600M0 396h1600M0 496h1600M0 596h1600M0 696h1600M0 796h1600M0 896h1600" stroke="#f5b51b"/><path d="M100 0v1000M300 0v1000M500 0v1000M700 0v1000M900 0v1000M1100 0v1000M1300 0v1000M1500 0v1000" stroke="#f5b51b"/></g><circle cx="168" cy="88" r="30" fill="url(#gold)"/><text x="168" y="99" text-anchor="middle" class="k num" font-size="31">B</text><text x="218" y="78" class="k label" fill="#fde68a">THE BEE SUITE • JULY 2026</text><text x="76" y="166" class="k h title">Getting started platform map</text><text x="76" y="218" class="k m body">Launch every school by connecting cloud services first, then migrating records, validating roles, and training each user group.</text><g filter="url(#shadow)"><rect x="76" y="282" width="330" height="250" rx="26" class="card"/><circle cx="122" cy="330" r="24" fill="url(#gold)"/><text x="122" y="340" text-anchor="middle" class="k num" font-size="25">1</text><text x="76" y="272" class="k label" fill="#fde68a">FOUNDATION</text><text x="76" y="583" class="k label" fill="#fde68a">INTEGRATIONS</text><text x="160" y="340" class="k h step">Cloud + data</text><text x="112" y="386" class="k m note">• Vercel env + deploy</text><text x="112" y="421" class="k m note">• Supabase DB/Auth/Storage</text><text x="112" y="456" class="k m note">• Prisma generate + migrate</text><text x="112" y="491" class="k s note">Note: keep service keys server-side.</text><rect x="446" y="282" width="330" height="250" rx="26" class="card"/><circle cx="492" cy="330" r="24" fill="url(#gold)"/><text x="492" y="340" text-anchor="middle" class="k num" font-size="25">2</text><text x="530" y="340" class="k h step">Payments</text><text x="482" y="386" class="k m note">• Stripe platform keys</text><text x="482" y="421" class="k m note">• Webhook + Connect accounts</text><text x="482" y="456" class="k m note">• Fee disclosures approved</text><text x="482" y="491" class="k s note">Note: checkout blocks until payouts are ready.</text><rect x="816" y="282" width="330" height="250" rx="26" class="card"/><circle cx="862" cy="330" r="24" fill="url(#gold)"/><text x="862" y="340" text-anchor="middle" class="k num" font-size="25">3</text><text x="900" y="340" class="k h step">Messaging</text><text x="852" y="386" class="k m note">• SendGrid/Mailgun email</text><text x="852" y="421" class="k m note">• Twilio SMS webhooks</text><text x="852" y="456" class="k m note">• Notification preferences</text><text x="852" y="491" class="k s note">Note: emergency messages need human review.</text><rect x="1186" y="282" width="330" height="250" rx="26" class="card"/><circle cx="1232" cy="330" r="24" fill="url(#gold)"/><text x="1232" y="340" text-anchor="middle" class="k num" font-size="25">4</text><text x="1270" y="340" class="k h step">Growth + AI</text><text x="1222" y="386" class="k m note">• Google inquiry/calendar sync</text><text x="1222" y="421" class="k m note">• Meta/Zapier webhooks</text><text x="1222" y="456" class="k m note">• OpenAI guarded drafts</text><text x="1222" y="491" class="k s note">Note: AI never finalizes sensitive decisions.</text><rect x="76" y="620" width="438" height="245" rx="26" class="card"/><circle cx="122" cy="668" r="24" fill="url(#gold)"/><text x="122" y="678" text-anchor="middle" class="k num" font-size="25">5</text><text x="160" y="678" class="k h step">Migrate records</text><text x="112" y="724" class="k m note">Procare CSVs, family intake, classrooms, staff, balances, documents, media, and duplicate matching.</text><text x="112" y="813" class="k s note">Validate source metadata before cutover.</text><rect x="582" y="620" width="438" height="245" rx="26" class="card"/><circle cx="628" cy="668" r="24" fill="url(#gold)"/><text x="628" y="678" text-anchor="middle" class="k num" font-size="25">6</text><text x="666" y="678" class="k h step">Configure schools</text><text x="618" y="724" class="k m note">Tenant, brand, owner group, center, director access, classroom ratios, billing controls, forms, and kiosk PIN setup.</text><text x="618" y="813" class="k s note">Use role smoke tests before inviting families.</text><rect x="1088" y="620" width="428" height="245" rx="26" class="card"/><circle cx="1134" cy="668" r="24" fill="url(#gold)"/><text x="1134" y="678" text-anchor="middle" class="k num" font-size="25">7</text><text x="1172" y="678" class="k h step">Train users</text><text x="1124" y="724" class="k m note">Executives, directors, teachers, parents, billing staff, auditors, and support all get role-specific quick starts.</text><text x="1124" y="813" class="k s note">Keep support escalation and owner approvals current.</text></g><text x="76" y="930" class="k m small">Operational rule: public app routes can stay visible, but protected setup, billing, child, custody, medical, and compliance workflows require authenticated role scope and audit history.</text></svg>
