.kcusa-home,
.kcusa-inquiry-form {
  --kcusa-white: #ffffff;
  --kcusa-ink: #10294b;
  --kcusa-muted: #536274;
  --kcusa-yellow: #ffc92f;
  --kcusa-green: #1f8a59;
  --kcusa-green-soft: #e9f7ef;
  --kcusa-blue-soft: #eef7ff;
  --kcusa-line: #d9e2ec;
  --kcusa-shadow: 0 22px 50px rgba(16, 41, 75, 0.14);
  --kcusa-radius: 8px;
  color: var(--kcusa-ink);
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.kcusa-home *,
.kcusa-inquiry-form * {
  box-sizing: border-box;
}

.kcusa-home img {
  display: block;
  max-width: 100%;
}

.kcusa-hero {
  position: relative;
  display: grid;
  grid-template-columns: minmax(380px, 0.95fr) minmax(280px, 0.62fr) minmax(360px, 430px);
  gap: clamp(22px, 3vw, 42px);
  align-items: center;
  min-height: 720px;
  padding: clamp(44px, 7vw, 92px) clamp(20px, 5vw, 72px) 56px;
  overflow: hidden;
  background: #ffffff;
}

.kcusa-hero:before {
  position: absolute;
  inset: 0 0 auto auto;
  width: min(45vw, 640px);
  height: min(45vw, 640px);
  background: radial-gradient(circle, rgba(255, 201, 47, 0.3), rgba(255, 255, 255, 0) 68%);
  content: "";
  pointer-events: none;
}

.kcusa-hero-copy,
.kcusa-hero-photo,
.kcusa-hero-panel {
  position: relative;
}

.kcusa-hero h1,
.kcusa-section h2 {
  margin: 0;
  color: var(--kcusa-ink);
  font-family: Nunito, Inter, system-ui, sans-serif;
  font-weight: 900;
  letter-spacing: 0;
}

.kcusa-hero h1 {
  max-width: 760px;
  font-size: clamp(3.4rem, 7vw, 7.4rem);
  line-height: 0.88;
}

.kcusa-hero-copy p {
  max-width: 660px;
  margin: 28px 0 0;
  color: var(--kcusa-muted);
  font-size: clamp(1.08rem, 1.6vw, 1.36rem);
  line-height: 1.58;
}

.kcusa-hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 34px;
}

.kcusa-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: 0 22px;
  border: 2px solid transparent;
  border-radius: var(--kcusa-radius);
  font-family: Inter, system-ui, sans-serif;
  font-size: 0.96rem;
  font-weight: 800;
  line-height: 1;
  text-decoration: none;
  cursor: pointer;
  transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
}

.kcusa-button:hover,
.kcusa-button:focus {
  transform: translateY(-1px);
  text-decoration: none;
}

.kcusa-button-primary {
  background: var(--kcusa-green);
  color: #ffffff;
  box-shadow: 0 12px 24px rgba(31, 138, 89, 0.22);
}

.kcusa-button-secondary {
  background: var(--kcusa-yellow);
  color: var(--kcusa-ink);
}

.kcusa-hero-points {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin: 38px 0 0;
  padding: 0;
  list-style: none;
}

.kcusa-hero-points li {
  padding: 10px 14px;
  border: 1px solid var(--kcusa-line);
  border-radius: 999px;
  background: #ffffff;
  color: #253f60;
  font-size: 0.9rem;
  font-weight: 800;
  line-height: 1.2;
}

.kcusa-hero-photo {
  align-self: stretch;
  min-height: 560px;
}

.kcusa-hero-photo:before {
  position: absolute;
  inset: 8% auto auto -8%;
  z-index: 2;
  width: 84px;
  height: 84px;
  border-radius: 50%;
  background: var(--kcusa-yellow);
  box-shadow: 0 18px 38px rgba(255, 201, 47, 0.28);
  content: "";
}

.kcusa-hero-photo img {
  width: 100%;
  height: 100%;
  min-height: 560px;
  object-fit: cover;
  object-position: center;
  border-radius: var(--kcusa-radius);
  box-shadow: var(--kcusa-shadow);
}

.kcusa-hero-panel {
  align-self: stretch;
  display: flex;
  align-items: center;
}

.kcusa-inquiry-form {
  width: 100%;
  padding: 28px;
  border: 1px solid rgba(217, 226, 236, 0.9);
  border-top: 8px solid var(--kcusa-yellow);
  border-radius: var(--kcusa-radius);
  background: #ffffff;
  box-shadow: var(--kcusa-shadow);
}

.kcusa-form-head h2 {
  margin: 0;
  color: var(--kcusa-ink);
  font-family: Nunito, Inter, system-ui, sans-serif;
  font-size: 1.65rem;
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: 0;
}

.kcusa-form-head p {
  margin: 8px 0 20px;
  color: var(--kcusa-muted);
  font-size: 0.94rem;
  line-height: 1.45;
}

.kcusa-inquiry-form label {
  display: grid;
  gap: 7px;
  margin: 0 0 15px;
}

.kcusa-inquiry-form span {
  color: #31435a;
  font-size: 0.8rem;
  font-weight: 800;
  line-height: 1.2;
}

.kcusa-inquiry-form input,
.kcusa-inquiry-form select {
  width: 100%;
  min-height: 48px;
  padding: 0 13px;
  border: 1px solid #c9d4df;
  border-radius: var(--kcusa-radius);
  background: #ffffff;
  color: var(--kcusa-ink);
  font: 600 0.96rem/1 Inter, system-ui, sans-serif;
}

.kcusa-inquiry-form input:focus,
.kcusa-inquiry-form select:focus {
  border-color: var(--kcusa-green);
  box-shadow: 0 0 0 4px rgba(31, 138, 89, 0.14);
  outline: none;
}

.kcusa-inquiry-form button {
  width: 100%;
  margin-top: 4px;
}

.kcusa-form-note,
.kcusa-form-status {
  margin: 12px 0 0;
  color: var(--kcusa-muted);
  font-size: 0.78rem;
  line-height: 1.4;
}

.kcusa-form-status:not(:empty) {
  color: var(--kcusa-green);
  font-weight: 800;
}

.kcusa-section {
  padding: clamp(58px, 8vw, 104px) clamp(20px, 5vw, 72px);
}

.kcusa-section-heading {
  display: grid;
  grid-template-columns: minmax(0, 0.9fr) minmax(280px, 0.7fr);
  gap: 38px;
  align-items: end;
  margin-bottom: 36px;
}

.kcusa-section h2 {

  line-height: 0.98;
}

.kcusa-section-heading p,
.kcusa-trust-copy p,

  color: var(--kcusa-muted);

  line-height: 1.65;
}

.kcusa-program-grid {

  gap: 22px;
}

.kcusa-program-card {

}

.kcusa-program-card img {

.kcusa-program-card div {

.kcusa-program-card h3 {

  font-family: Nunito, Inter, system-ui, sans-serif;
  font-size: 1.55rem;
  font-weight: 900;
  line-height: 1.05;
}

.kcusa-program-card p {
  margin: 0;
  color: var(--kcusa-muted);
  font-size: 0.96rem;
  line-height: 1.55;
}

.kcusa-trust {

.kcusa-locations {

  background: var(--kcusa-ink);
  color: #ffffff;

.kcusa-locations h2 {

  background: var(--kcusa-yellow);
  color: var(--kcusa-ink);

}

@media (max-width: 1100px) {

  .kcusa-section-heading,

  }

  }

  }

  .kcusa-program-grid {

  }

    grid-template-columns: 220px 1fr;
  }

  .kcusa-program-card img {

}

@media (max-width: 720px) {

  .kcusa-hero-actions,

    flex-direction: column;
  }

  .kcusa-button {
    width: 100%;
  }

  .kcusa-hero-points {
    display: grid;
  }

  .kcusa-inquiry-form {
    padding: 22px;
  }

  .kcusa-hero-photo {
    min-height: 220px;
  }

  .kcusa-hero-photo img {
    min-height: 220px;
  }

  .kcusa-program-card {
    display: block;
  }

  .kcusa-program-card img {
    height: auto;
    aspect-ratio: 1.28;
  }
}

</style>

<script>
(function () {
  function getSelectedLocation(select) {
    var option = select && select.options[select.selectedIndex];

    if (!option || !option.value) {
      return null;
    }

    return {
      id: option.value,
      label: option.textContent.trim(),
      city: option.getAttribute("data-city") || "",
      state: option.getAttribute("data-state") || "",
      address: option.getAttribute("data-address") || "",
      postalCode: option.getAttribute("data-postal-code") || "",
      phone: option.getAttribute("data-location-phone") || ""
    };
  }

  function getQueryParam(name) {
    try {
      return new URLSearchParams(window.location.search).get(name) || "";
    } catch (error) {
      return "";
    }
  }

  async function submitInquiry(form) {
    var status = form.querySelector(".kcusa-form-status");
    var endpoint = form.getAttribute("data-crm-endpoint");
    var data = new FormData(form);
    var selectedLocation = getSelectedLocation(form.querySelector('select[name="locationId"]'));

    if (!endpoint) {
      status.textContent = "The inquiry endpoint is not configured yet.";
      return;
    }

    var payload = {
      parentName: data.get("parentName"),
      email: data.get("email"),
      phone: data.get("phone"),
      program: data.get("program"),
      locationId: data.get("locationId"),
      locationName: selectedLocation ? selectedLocation.label : "",
      city: selectedLocation ? selectedLocation.city : "",
      state: selectedLocation ? selectedLocation.state : "",
      address: selectedLocation ? selectedLocation.address : "",
      postalCode: selectedLocation ? selectedLocation.postalCode : "",
      locationPhone: selectedLocation ? selectedLocation.phone : "",
      leadSource: data.get("leadSource") || "Kid City USA Website Inquiry",
      pageUrl: window.location.href,
      utmSource: getQueryParam("utm_source"),
      utmMedium: getQueryParam("utm_medium"),
      utmCampaign: getQueryParam("utm_campaign")
    };

    status.textContent = "Submitting...";
    form.querySelector('button[type="submit"]').disabled = true;

    var response = await fetch(endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    var result = await response.json().catch(function () { return {}; });

    if (!response.ok || !result.ok) {
      throw new Error(result.error || "Inquiry submission failed.");
    }

    form.reset();
    status.textContent = "Thanks. Your inquiry has been submitted.";
  }

  document.addEventListener("submit", function (event) {
    var form = event.target.closest(".kcusa-inquiry-form");

    if (!form) {
      return;
    }

    event.preventDefault();

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    submitInquiry(form).catch(function () {
      var status = form.querySelector(".kcusa-form-status");
      status.textContent = "Sorry, the inquiry could not be submitted. Please try again or call Kid City USA.";
    }).finally(function () {
      var button = form.querySelector('button[type="submit"]');
      if (button) button.disabled = false;
    });
  });
})();
</script>
