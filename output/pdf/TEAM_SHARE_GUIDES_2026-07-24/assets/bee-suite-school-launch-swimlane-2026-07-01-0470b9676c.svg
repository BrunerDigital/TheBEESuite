<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc"><title id="title">School launch swimlane</title><desc id="desc">Role-by-role launch steps for executive admins, directors, teachers, parents, billing, and support.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#05070a"/><stop offset="1" stop-color="#111827"/></linearGradient><linearGradient id="gold" x1="0" x2="1"><stop stop-color="#fde68a"/><stop offset="1" stop-color="#f5b51b"/></linearGradient><style>.k{font-family:Inter,Arial,sans-serif}.h{fill:#fff;font-weight:950}.m{fill:#d4d4d8}.s{fill:#a1a1aa}.lane{fill:rgba(255,255,255,.065);stroke:rgba(255,255,255,.14)}.box{fill:rgba(245,181,27,.1);stroke:rgba(245,181,27,.38)}.role{font-size:29px;font-weight:900}.txt{font-size:22px}.title{font-size:64px;font-weight:950}.badge{font-size:18px;font-weight:900;letter-spacing:.12em}</style></defs><rect width="1600" height="1000" fill="url(#bg)"/><circle cx="1330" cy="116" r="220" fill="#f5b51b" opacity=".11"/><circle cx="210" cy="890" r="260" fill="#38bdf8" opacity=".08"/><text x="72" y="90" class="k badge" fill="#fde68a">THE BEE SUITE • STARTUP TRAINING GRAPHIC</text><text x="72" y="166" class="k h title">School launch swimlane</text><text x="72" y="216" class="k m" font-size="28">Use this as the live order of operations after platform services are connected.</text><g transform="translate(72 280)"><rect width="1456" height="92" rx="22" class="lane"/><text x="28" y="56" class="k h role">Executive / owner</text><rect x="342" y="18" width="220" height="56" rx="16" class="box"/><text x="365" y="53" class="k m txt">Approve pilot scope</text><rect x="586" y="18" width="220" height="56" rx="16" class="box"/><text x="608" y="53" class="k m txt">Create centers</text><rect x="830" y="18" width="256" height="56" rx="16" class="box"/><text x="852" y="53" class="k m txt">Grant scoped users</text><rect x="1110" y="18" width="310" height="56" rx="16" class="box"/><text x="1132" y="53" class="k m txt">Review reports + exceptions</text></g><g transform="translate(72 388)"><rect width="1456" height="92" rx="22" class="lane"/><text x="28" y="56" class="k h role">Director</text><rect x="342" y="18" width="220" height="56" rx="16" class="box"/><text x="364" y="53" class="k m txt">Finish setup list</text><rect x="586" y="18" width="220" height="56" rx="16" class="box"/><text x="608" y="53" class="k m txt">Import families</text><rect x="830" y="18" width="256" height="56" rx="16" class="box"/><text x="852" y="53" class="k m txt">Set classrooms/PINs</text><rect x="1110" y="18" width="310" height="56" rx="16" class="box"/><text x="1132" y="53" class="k m txt">Run smoke test + train staff</text></g><g transform="translate(72 496)"><rect width="1456" height="92" rx="22" class="lane"/><text x="28" y="56" class="k h role">Teachers</text><rect x="342" y="18" width="220" height="56" rx="16" class="box"/><text x="364" y="53" class="k m txt">Confirm profile</text><rect x="586" y="18" width="220" height="56" rx="16" class="box"/><text x="608" y="53" class="k m txt">Take attendance</text><rect x="830" y="18" width="256" height="56" rx="16" class="box"/><text x="852" y="53" class="k m txt">Daily reports/media</text><rect x="1110" y="18" width="310" height="56" rx="16" class="box"/><text x="1132" y="53" class="k m txt">Incidents + parent replies</text></g><g transform="translate(72 604)"><rect width="1456" height="92" rx="22" class="lane"/><text x="28" y="56" class="k h role">Parents</text><rect x="342" y="18" width="220" height="56" rx="16" class="box"/><text x="364" y="53" class="k m txt">Accept invite</text><rect x="586" y="18" width="220" height="56" rx="16" class="box"/><text x="608" y="53" class="k m txt">Verify profile</text><rect x="830" y="18" width="256" height="56" rx="16" class="box"/><text x="852" y="53" class="k m txt">Forms/documents</text><rect x="1110" y="18" width="310" height="56" rx="16" class="box"/><text x="1132" y="53" class="k m txt">Pay + check in/out</text></g><g transform="translate(72 712)"><rect width="1456" height="92" rx="22" class="lane"/><text x="28" y="56" class="k h role">Billing / compliance</text><rect x="342" y="18" width="220" height="56" rx="16" class="box"/><text x="364" y="53" class="k m txt">Payout readiness</text><rect x="586" y="18" width="220" height="56" rx="16" class="box"/><text x="608" y="53" class="k m txt">Invoices/ledger</text><rect x="830" y="18" width="256" height="56" rx="16" class="box"/><text x="852" y="53" class="k m txt">Required docs</text><rect x="1110" y="18" width="310" height="56" rx="16" class="box"/><text x="1132" y="53" class="k m txt">FTE/licensing exports</text></g><g transform="translate(72 820)"><rect width="1456" height="92" rx="22" class="lane"/><text x="28" y="56" class="k h role">Support</text><rect x="342" y="18" width="220" height="56" rx="16" class="box"/><text x="364" y="53" class="k m txt">Monitor health</text><rect x="586" y="18" width="220" height="56" rx="16" class="box"/><text x="608" y="53" class="k m txt">Audit logs</text><rect x="830" y="18" width="256" height="56" rx="16" class="box"/><text x="852" y="53" class="k m txt">Escalate safely</text><rect x="1110" y="18" width="310" height="56" rx="16" class="box"/><text x="1132" y="53" class="k m txt">Document go/no-go</text></g><text x="72" y="958" class="k s" font-size="22">Notes: do not enable live parent payments without Stripe readiness, approved disclosures, refund/dispute workflow, and school signoff. Keep child safety, custody, medical, billing, and compliance decisions human-reviewed.</text></svg>
