<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc"><title id="title">Daily user quick start cards</title><desc id="desc">Quick start cards for directors, teachers, parents, billing users, and executives.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#080b10"/><stop offset=".7" stop-color="#05070a"/><stop offset="1" stop-color="#241805"/></linearGradient><linearGradient id="gold" x1="0" x2="1"><stop stop-color="#fde68a"/><stop offset="1" stop-color="#f5b51b"/></linearGradient><style>.k{font-family:Inter,Arial,sans-serif}.h{fill:#fff;font-weight:950}.m{fill:#d4d4d8}.s{fill:#a1a1aa}.card{fill:rgba(255,255,255,.075);stroke:rgba(255,255,255,.16)}.n{fill:#15100a;font-weight:950}.title{font-size:64px}.role{font-size:34px}.txt{font-size:23px}.badge{font-size:18px;font-weight:900;letter-spacing:.12em}</style></defs><rect width="1600" height="1000" fill="url(#bg)"/><text x="72" y="86" class="k badge" fill="#fde68a">THE BEE SUITE • USER QUICK START</text><text x="72" y="162" class="k h title">What each user does first</text><text x="72" y="212" class="k m" font-size="28">Give new users the card that matches their role, then validate the workflow in the app before go-live.</text><g transform="translate(72 282)"><rect width="456" height="260" rx="28" class="card"/><circle cx="52" cy="58" r="27" fill="url(#gold)"/><text x="52" y="68" text-anchor="middle" class="k n" font-size="28">1</text><text x="96" y="68" class="k h role">Directors</text><text x="40" y="120" class="k m txt">• Review dashboard snapshot</text><text x="40" y="157" class="k m txt">• Finish setup checklist</text><text x="40" y="194" class="k m txt">• Import/add families + staff</text><text x="40" y="231" class="k s txt">Note: verify role scope before editing live records.</text></g><g transform="translate(572 282)"><rect width="456" height="260" rx="28" class="card"/><circle cx="52" cy="58" r="27" fill="url(#gold)"/><text x="52" y="68" text-anchor="middle" class="k n" font-size="28">2</text><text x="96" y="68" class="k h role">Teachers</text><text x="40" y="120" class="k m txt">• Confirm classroom roster</text><text x="40" y="157" class="k m txt">• Take attendance and reports</text><text x="40" y="194" class="k m txt">• Share approved media</text><text x="40" y="231" class="k s txt">Note: held media needs director review.</text></g><g transform="translate(1072 282)"><rect width="456" height="260" rx="28" class="card"/><circle cx="52" cy="58" r="27" fill="url(#gold)"/><text x="52" y="68" text-anchor="middle" class="k n" font-size="28">3</text><text x="96" y="68" class="k h role">Parents</text><text x="40" y="120" class="k m txt">• Set password from invite</text><text x="40" y="157" class="k m txt">• Verify contacts and pickups</text><text x="40" y="194" class="k m txt">• Complete forms/pay invoices</text><text x="40" y="231" class="k s txt">Note: custody updates require school review.</text></g><g transform="translate(72 590)"><rect width="456" height="260" rx="28" class="card"/><circle cx="52" cy="58" r="27" fill="url(#gold)"/><text x="52" y="68" text-anchor="middle" class="k n" font-size="28">4</text><text x="96" y="68" class="k h role">Billing</text><text x="40" y="120" class="k m txt">• Check Stripe payout status</text><text x="40" y="157" class="k m txt">• Review invoices and ledger</text><text x="40" y="194" class="k m txt">• Reconcile payments/exports</text><text x="40" y="231" class="k s txt">Note: payment recovery requires approval.</text></g><g transform="translate(572 590)"><rect width="456" height="260" rx="28" class="card"/><circle cx="52" cy="58" r="27" fill="url(#gold)"/><text x="52" y="68" text-anchor="middle" class="k n" font-size="28">5</text><text x="96" y="68" class="k h role">Executives</text><text x="40" y="120" class="k m txt">• Monitor locations and KPIs</text><text x="40" y="157" class="k m txt">• Manage users and access</text><text x="40" y="194" class="k m txt">• Review FTE/compliance queues</text><text x="40" y="231" class="k s txt">Note: archive closed schools, do not delete history.</text></g><g transform="translate(1072 590)"><rect width="456" height="260" rx="28" class="card"/><circle cx="52" cy="58" r="27" fill="url(#gold)"/><text x="52" y="68" text-anchor="middle" class="k n" font-size="28">6</text><text x="96" y="68" class="k h role">Support / AI</text><text x="40" y="120" class="k m txt">• Use audit logs and health checks</text><text x="40" y="157" class="k m txt">• Let Mr. Bee draft only</text><text x="40" y="194" class="k m txt">• Escalate billing/safety issues</text><text x="40" y="231" class="k s txt">Note: human owners approve final actions.</text></g><text x="72" y="930" class="k m" font-size="24">Best practice: train in this order — executives/directors, teachers, parents, billing/compliance, then support handoff. Repeat role smoke tests after every material workflow change.</text></svg>
